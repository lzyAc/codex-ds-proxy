name: 构建与发布

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 安装前端依赖
        working-directory: desktop-app
        run: npm install
      - name: 构建 macOS DMG
        working-directory: desktop-app
        run: npx tauri build --bundles dmg
      - name: 上传 DMG 到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: desktop-app/src-tauri/target/release/bundle/dmg/*.dmg
          tag_name: ${{ github.ref_name }}
          draft: true

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 安装前端依赖
        working-directory: desktop-app
        run: npm install
      - name: 构建 Windows 安装包
        working-directory: desktop-app
        run: npx tauri build --bundles nsis
      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: desktop-app/src-tauri/target/release/bundle/nsis/*.exe
          tag_name: ${{ github.ref_name }}
          draft: true

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: 安装前端依赖
        working-directory: desktop-app
        run: npm install
      - name: 构建 Linux 包
        working-directory: desktop-app
        run: npx tauri build --bundles deb
      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: desktop-app/src-tauri/target/release/bundle/deb/*.deb
          tag_name: ${{ github.ref_name }}
          draft: true
