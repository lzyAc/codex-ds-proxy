name: 构建与发布

on:
  push:
    tags:
      - "v*"  # 推送 v1.0.0, v1.1.0 等 tag 时触发

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'x86_64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: 安装前端依赖
        working-directory: desktop-app
        run: pnpm install

      - name: 安装 Tauri 依赖
        run: |
          brew install python3
          python3 -m pip install --break-system-packages -r requirements.txt

      - name: 构建 macOS DMG
        working-directory: desktop-app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ vars.APPLE_ID }}
          APPLE_PASSWORD: ${{ vars.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          # 如果没配签名密钥，跳过签名
          if [ -z "$APPLE_CERTIFICATE" ]; then
            pnpm tauri build --bundles dmg --no-bundle
          else
            pnpm tauri build --bundles dmg
          fi

      - name: 上传 DMG 到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop-app/src-tauri/target/release/bundle/dmg/*.dmg
            desktop-app/src-tauri/target/release/codex-ds-proxy
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: false

  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: 安装前端依赖
        working-directory: desktop-app
        run: pnpm install

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt

      - name: 构建 Windows 安装包
        working-directory: desktop-app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # Windows 用 NSIS 构建
          pnpm tauri build --bundles nsis

      - name: 上传安装包到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop-app/src-tauri/target/release/bundle/nsis/*.exe
            desktop-app/src-tauri/target/release/bundle/msi/*.msi
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: false

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            python3 \
            python3-pip

      - name: 安装前端依赖
        working-directory: desktop-app
        run: pnpm install

      - name: 安装 Python 依赖
        run: |
          pip3 install --break-system-packages -r requirements.txt

      - name: 构建 Linux 包
        working-directory: desktop-app
        run: |
          pnpm tauri build --bundles deb

      - name: 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            desktop-app/src-tauri/target/release/bundle/deb/*.deb
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: false
